# ============================================================
# RyFrame 默认配置
# 此文件包含所有配置项的默认值，由环境配置文件覆盖
# ============================================================

[app]
name = "ryframe"
version = "0.5.0"
host = "0.0.0.0"
port = 8080

[database]
# SQL 日志级别: off(关闭) / summary(SQL+耗时+行数) / full(含完整SQL)
sql_log_level = "off"

[database.primary]
host = "localhost"
port = 3306
database = "ryframe_config"
username = "root"
password = ""
max_connections = 10
min_connections = 1

[generator]
# 读取表结构的数据源名称；默认使用 primary。
data_source = "primary"

[auth]
jwt_secret = "change-me-in-production"
access_token_expire = "1h"
refresh_token_expire = "168h"

[redis]
mode = "optional"
host = "127.0.0.1"
port = 6379
password = ""
database = 0
max_pool_size = 16
timeout_secs = 3

[logger]
level = "info"
format = "text"
output = "stdout"

[cors]
#allow_origins = ["https://admin.example.com"]
allow_origins = []

[proxy]
# Trust forwarding headers only from explicitly listed reverse proxies.
trusted_cidrs = []

[upload]
# File-size limits exclude a small multipart envelope allowance.
file_max_bytes = 10485760
avatar_max_bytes = 5242880
multipart_envelope_bytes = 65536
upload_timeout_seconds = 120
api_timeout_seconds = 30

[rate_limit]
# 是否启用全局限流
enabled = true
# 令牌桶容量（每窗口最大请求数）
capacity = 100
# 每秒补充令牌数（0 表示使用 window_secs 固定窗口模式）
refill_per_sec = 20
# 固定窗口时长（秒），0 使用 refill_per_sec 令牌桶模式
window_secs = 0
# ========== 用户级限流 ==========
# 是否启用用户级限流（需 Redis + 在 system_router 添加中间件）
enable_user_rate_limit = false
# 用户级窗口时长（秒）
user_window_secs = 60
# 每用户每窗口最大请求数
user_capacity = 500
# ========== 接口级限流 ==========
# 敏感接口限流：METHOD /path = 每窗口最大请求数
# 示例：{"POST /api/v1/auth/login" = 5} 表示登录接口每分钟最多 5 次
[rate_limit.api_limits]
"POST /api/v1/auth/login" = 5
"GET /api/v1/auth/csrf" = 30
# 接口级窗口时长（秒）
api_window_secs = 60

[object_storage]
# 存储后端: local（本地）| rustfs（RustFS）| minio（MinIO）| s3（S3-compatible）
backend = "local"
# 本地存储根目录
local_base_dir = "uploads"
# RustFS / MinIO / S3 端点
endpoint = ""
# Access Key（生产环境通过 APP_OBJECT_STORAGE_ACCESS_KEY 注入）
access_key = ""
# Secret Key（生产环境通过 APP_OBJECT_STORAGE_SECRET_KEY 注入）
secret_key = ""
# 是否启用 SSL
use_ssl = false
# AWS Region
region = "us-east-1"
