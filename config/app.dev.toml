# 开发环境配置
# 仅覆盖与默认值不同的项

[app]
name = "ryframe"
version = "0.1.0"
host = "0.0.0.0"
port = 8080

[database]
# 开发环境输出 SQL 摘要日志
# off = 关闭 | summary = SQL+耗时+行数 | full = 含完整SQL
sql_log_level = "full"

# 开发环境数据库连接
[database.primary]
driver = "mysql"
host = "localhost"
port = 3306
database = "ryframe_config"
username = "root"
password = "123456"
max_connections = 10
min_connections = 1

# 同结构只读副本通过 `[[database.replicas]]` 单独配置；本机开发环境暂不配置。

# 独立业务数据源必须按名称显式使用，不参与主库读写路由。
[[database.sources]]
name = "ryframe_device"
driver = "mysql"
host = "localhost"
port = 3306
database = "ryframe_device"
username = "root"
password = "123456"
max_connections = 5
min_connections = 1

[generator]
data_source = "ryframe_device"

[object_storage]
backend = "rustfs"
endpoint = "http://localhost:9000"
access_key = "rustfsadmin"
secret_key = "rustfsadmin"
use_ssl = false
region = "us-east-1"

[redis]
host = "127.0.0.1"
port = 6379
password = ""
database = 0

[cors]
#allow_origins = ["http://localhost:80", "http://localhost:3000"]
allow_origins = []
[logger]
level = "debug"
