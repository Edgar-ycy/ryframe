name: Release

on:
  push:
    tags: [ 'V*', 'v*' ]

# 防止并发推送
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always
  CARGO_HTTP_TIMEOUT: "600"

jobs:
  # ============================================================
  # 构建二进制 (仅 tag 触发)
  # ============================================================
  build:
    name: Build Release Binary
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/V') || startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: Swatinem/rust-cache@v2

      - name: Build release
        run: cargo build --release --bin ryframe

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: ryframe-linux
          path: target/release/ryframe

  # ============================================================
  # Stable 发布 (手动创建 V* 或 v* tag 触发)
  # ============================================================
  stable:
    name: Create Stable Release
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/V') || startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download binary
        uses: actions/download-artifact@v4
        with:
          name: ryframe-linux

      - name: Extract changelog
        id: changelog
        run: |
          # 从 CHANGELOG.md 提取当前版本的 release notes
          if [ -f CHANGELOG.md ]; then
            awk '/^## \[/{if(found) exit; found=1} found' CHANGELOG.md | tail -n +2 > release_body.md
          fi
          if [ ! -s release_body.md ]; then
            echo "## Release ${{ github.ref_name }}" > release_body.md
            echo "" >> release_body.md
            echo "Commit: ${{ github.sha }}" >> release_body.md
          fi

      - name: Create Stable Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          body_path: release_body.md
          prerelease: false
          files: ryframe
