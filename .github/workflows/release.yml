name: Release

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]

# 防止并发推送
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always
  CARGO_HTTP_TIMEOUT: "600"

jobs:
  # ============================================================
  # 构建二进制
  # ============================================================
  build:
    name: Build Release Binary
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: Swatinem/rust-cache@v2

      - name: Build release
        run: cargo build --release --bin ryframe

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: ryframe-linux
          path: target/release/ryframe

  # ============================================================
  # Docker 镜像构建 + 推送
  # ============================================================
  docker:
    name: Docker Build & Push
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') }}
            type=raw,value=nightly,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ============================================================
  # Nightly 自动发布 (push main)
  # ============================================================
  nightly:
    name: Create Nightly Release
    runs-on: ubuntu-latest
    needs: [build, docker]
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download binary
        uses: actions/download-artifact@v4
        with:
          name: ryframe-linux

      - name: Generate nightly tag
        id: tag
        run: |
          TAG="nightly-$(date +%Y%m%d-%H%M%S)"
          echo "tag=$TAG" >> $GITHUB_OUTPUT

      - name: Create Nightly Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: Nightly ${{ steps.tag.outputs.tag }}
          body: |
            ## 🔧 Nightly Build

            自动构建于 `main` 分支。

            - Commit: ${{ github.sha }}
            - 时间: ${{ github.event.head_commit.timestamp }}

            > ⚠️ 这是开发中的快照版本，可能不稳定。
          prerelease: true
          files: ryframe

  # ============================================================
  # Stable 发布 (tag v*)
  # ============================================================
  stable:
    name: Create Stable Release
    runs-on: ubuntu-latest
    needs: [build, docker]
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download binary
        uses: actions/download-artifact@v4
        with:
          name: ryframe-linux

      - name: Extract changelog
        id: changelog
        run: |
          # 从 CHANGELOG.md 提取当前版本的 release notes
          if [ -f CHANGELOG.md ]; then
            awk '/^## \[/{if(found) exit; found=1} found' CHANGELOG.md | tail -n +2 > release_body.md
          fi
          if [ ! -s release_body.md ]; then
            echo "## Release ${{ github.ref_name }}" > release_body.md
            echo "" >> release_body.md
            echo "Commit: ${{ github.sha }}" >> release_body.md
          fi

      - name: Create Stable Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          body_path: release_body.md
          prerelease: false
          files: ryframe
