name: Release

on:
  push:
    branches: [ main ]
    tags: [ 'V*', 'v*' ]

# 防止并发推送
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always
  CARGO_HTTP_TIMEOUT: "600"

jobs:
  # ============================================================
  # Nightly 自动发布 (push main, 复用固定 nightly tag)
  # ============================================================
  nightly:
    name: Create Nightly Release
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Package source
        run: |
          git archive --format=tar.gz --output=ryframe-nightly-src.tar.gz HEAD
          git archive --format=zip --output=ryframe-nightly-src.zip HEAD

      - name: Force update nightly tag
        run: |
          git tag -f nightly
          git push -f origin nightly

      - name: Create Nightly Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: nightly
          name: Nightly
          body: |
            ## 🔧 Nightly Build

            自动构建于 `main` 分支。

            - Commit: ${{ github.sha }}
            - 时间: ${{ github.event.head_commit.timestamp }}

            > ⚠️ 这是开发中的快照版本，可能不稳定。
          prerelease: true
          files: |
            ryframe-nightly-src.tar.gz
            ryframe-nightly-src.zip

  # ============================================================
  # Stable 发布 (手动创建 V* 或 v* tag 触发)
  # ============================================================
  stable:
    name: Create Stable Release
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/V') || startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Package source
        run: |
          RELEASE_TAG="${{ github.ref_name }}"
          git archive --format=tar.gz --output="ryframe-${RELEASE_TAG}-src.tar.gz" HEAD
          git archive --format=zip --output="ryframe-${RELEASE_TAG}-src.zip" HEAD

      - name: Extract changelog
        id: changelog
        run: |
          # 从 CHANGELOG.md 提取当前版本的 release notes
          if [ -f CHANGELOG.md ]; then
            awk '/^## \[/{if(found) exit; found=1} found' CHANGELOG.md | tail -n +2 > release_body.md
          fi
          if [ ! -s release_body.md ]; then
            echo "## Release ${{ github.ref_name }}" > release_body.md
            echo "" >> release_body.md
            echo "Commit: ${{ github.sha }}" >> release_body.md
          fi

      - name: Create Stable Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          body_path: release_body.md
          prerelease: false
          files: |
            ryframe-${{ github.ref_name }}-src.tar.gz
            ryframe-${{ github.ref_name }}-src.zip
