name: RC and Stable Release

on:
  push:
    tags:
      - "v*.*.*"

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always
  CARGO_HTTP_TIMEOUT: "600"
  CARGO_NET_RETRY: "5"
  GIT_CONFIG_COUNT: "1"
  GIT_CONFIG_KEY_0: init.defaultBranch
  GIT_CONFIG_VALUE_0: main
  RUSTDOCFLAGS: "-Dwarnings"

permissions:
  actions: read
  contents: read
  deployments: read

jobs:
  validate-release:
    name: Validate coordinated tag and RC identity
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.release.outputs.tag }}
      stable_tag: ${{ steps.release.outputs.stable_tag }}
      prerelease: ${{ steps.release.outputs.prerelease }}
    steps:
      - name: Check out backend tag
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Verify backend tag belongs to main
        shell: bash
        run: |
          set -euo pipefail
          git fetch --force --tags origin
          git fetch --no-tags origin +main:refs/remotes/origin/main
          git merge-base --is-ancestor HEAD origin/main || {
            echo "Release tag must point to a backend commit contained in main."
            exit 1
          }
          [[ "$(git rev-parse "$GITHUB_REF_NAME^{commit}")" == "$(git rev-parse HEAD)" ]]

      - name: Check out matching frontend tag
        uses: actions/checkout@v6
        with:
          repository: Edgar-ycy/ryframe-vue3
          ref: ${{ github.ref_name }}
          fetch-depth: 0
          path: frontend

      - name: Verify frontend tag belongs to main
        shell: bash
        run: |
          set -euo pipefail
          git -C frontend fetch --force --tags origin
          git -C frontend fetch --no-tags origin +main:refs/remotes/origin/main
          git -C frontend merge-base --is-ancestor HEAD origin/main || {
            echo "Release tag must point to a frontend commit contained in main."
            exit 1
          }

      - name: Read published release candidates for stable
        if: ${{ !contains(github.ref_name, '-rc.') }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: >-
          gh api
          "repos/${GITHUB_REPOSITORY}/releases?per_page=100"
          > "$RUNNER_TEMP/releases.json"

      - name: Collect commit-bound RC observation evidence
        if: ${{ !contains(github.ref_name, '-rc.') }}
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          escaped_tag="${GITHUB_REF_NAME//./\\.}"
          rc_pattern="^${escaped_tag}-rc\\.[1-9][0-9]*$"
          rc_tag="$(jq -r --arg pattern "$rc_pattern" '
            [ .[]
              | select(.prerelease == true and .draft != true)
              | select(.published_at != null)
              | select(.tag_name | test($pattern))
            ]
            | sort_by(.published_at, .tag_name)
            | last
            | .tag_name // empty
          ' "$RUNNER_TEMP/releases.json")"
          [[ -n "$rc_tag" ]] || {
            echo "No published RC exists for $GITHUB_REF_NAME."
            exit 1
          }
          rc_commit="$(git rev-parse "$rc_tag^{commit}")"

          gh api --method GET "repos/${GITHUB_REPOSITORY}/deployments" \
            -f sha="$rc_commit" \
            -f environment=release-candidate \
            -f per_page=100 \
            > "$RUNNER_TEMP/deployments-source.json"

          output="$RUNNER_TEMP/deployments.json"
          printf '[' > "$output"
          first=true
          while IFS= read -r deployment; do
            deployment_id="$(jq -r '.id' <<< "$deployment")"
            gh api --method GET \
              "repos/${GITHUB_REPOSITORY}/deployments/${deployment_id}/statuses?per_page=100" \
              > "$RUNNER_TEMP/deployment-statuses.json"
            if [[ "$first" == false ]]; then
              printf ',' >> "$output"
            fi
            jq -c --argjson deployment "$deployment" \
              --slurpfile statuses "$RUNNER_TEMP/deployment-statuses.json" \
              '$deployment + {statuses: $statuses[0]}' >> "$output"
            first=false
          done < <(jq -c '.[]' "$RUNNER_TEMP/deployments-source.json")
          printf ']\n' >> "$output"

          gh api --method GET \
            "repos/${GITHUB_REPOSITORY}/environments/stable-release" \
            > "$RUNNER_TEMP/stable-environment.json"
      - name: Validate coordinated release inputs
        shell: bash
        run: |
          set -euo pipefail
          args=(
            --tag "$GITHUB_REF_NAME"
            --frontend-dir frontend
            --minimum-rc-hours 48
          )
          if [[ "$GITHUB_REF_NAME" != *-rc.* ]]; then
            args+=(
              --github-releases-json "$RUNNER_TEMP/releases.json"
              --github-deployments-json "$RUNNER_TEMP/deployments.json"
              --stable-environment-json "$RUNNER_TEMP/stable-environment.json"
            )
          fi
          python scripts/validate_release.py "${args[@]}"

      - name: Export release identity
        id: release
        shell: bash
        run: |
          set -euo pipefail
          version="${GITHUB_REF_NAME#v}"
          version="${version%%-rc.*}"
          prerelease=false
          if [[ "$GITHUB_REF_NAME" == *-rc.* ]]; then
            prerelease=true
          fi
          {
            echo "tag=$GITHUB_REF_NAME"
            echo "stable_tag=v$version"
            echo "prerelease=$prerelease"
          } >> "$GITHUB_OUTPUT"

  backend-gate:
    name: Backend, MySQL, Redis, storage, and recovery gate
    needs: validate-release
    runs-on: ubuntu-latest
    env:
      RUSTFLAGS: "-Dwarnings"
      APP_ENV: test
      APP_APP_PORT: "18080"
      APP_AUTH_JWT_SECRET: release-gate-jwt-secret-not-for-production
      APP_AUTH_REFRESH_TOKEN_EXPIRE: 168h
      APP_DATABASE_HOST: 127.0.0.1
      APP_DATABASE_PORT: "13306"
      APP_DATABASE_NAME: ryframe_test
      APP_DATABASE_USERNAME: root
      APP_DATABASE_PASSWORD: ryframe_test_password
      APP_DATABASE_REPLICAS: "[]"
      APP_DATABASE_SOURCES: "[]"
      APP_GENERATOR_DATA_SOURCE: primary
      APP_REDIS_MODE: required
      APP_REDIS_HOST: 127.0.0.1
      APP_REDIS_PORT: "16379"
      RYFRAME_TEST_REDIS_PORT: "16379"
      APP_OBJECT_STORAGE_BACKEND: rustfs
      APP_OBJECT_STORAGE_ENDPOINT: http://127.0.0.1:19000
      APP_OBJECT_STORAGE_ACCESS_KEY: ryframe-test-access
      APP_OBJECT_STORAGE_SECRET_KEY: ryframe-test-secret-2026
      APP_OBJECT_STORAGE_REGION: us-east-1
      RYFRAME_TEST_MYSQL_ADMIN_URL: mysql://root:ryframe_test_password@127.0.0.1:13306/mysql
      RYFRAME_PRIMARY_DATABASE_URL: mysql://root:ryframe_test_password@127.0.0.1:13306/ryframe_test
      ADMIN_USER: admin
      ADMIN_PASS: "123456"
      TENANT_ID: system
      DB_HOST: 127.0.0.1
      DB_PORT: "13306"
      DB_NAME: ryframe_test
      DB_USER: root
      DB_PASSWORD: ryframe_test_password
      BACKUP_DIR: target/release-gate-backups
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Install cargo-nextest
        uses: taiki-e/install-action@nextest

      - name: Install cargo-audit
        uses: taiki-e/install-action@cargo-audit

      - name: Install cargo-deny
        uses: taiki-e/install-action@cargo-deny

      - name: Set up Node.js for runtime smoke
        uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Install shell and MySQL clients
        run: |
          sudo apt-get update
          sudo apt-get install --yes shellcheck default-mysql-client

      - name: Rust cache
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: release-rust-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('**/Cargo.lock', '**/Cargo.toml') }}
          restore-keys: |
            release-rust-${{ runner.os }}-${{ runner.arch }}-

      - name: Start pinned test services
        run: docker compose -f docker-compose.test.yml up --detach --wait

      - name: Verify production Redis persistence and no-eviction policy
        shell: bash
        run: |
          set -euo pipefail
          redis_compose=(docker compose -f docker-compose.test.yml)
          redis_cli=("${redis_compose[@]}" exec -T redis redis-cli --raw)

          [[ "$("${redis_cli[@]}" CONFIG GET appendonly | tail -n 1)" == yes ]]
          [[ "$("${redis_cli[@]}" CONFIG GET appendfsync | tail -n 1)" == everysec ]]
          [[ "$("${redis_cli[@]}" CONFIG GET maxmemory-policy | tail -n 1)" == noeviction ]]
          grep -Eq '^appendonly[[:space:]]+yes$' deploy/redis/redis.conf
          grep -Eq '^maxmemory-policy[[:space:]]+noeviction$' deploy/redis/redis.conf

          "${redis_cli[@]}" SET ryframe:release:persistence survived >/dev/null
          sleep 2
          "${redis_compose[@]}" restart redis
          for attempt in $(seq 1 30); do
            if [[ "$("${redis_cli[@]}" PING 2>/dev/null || true)" == PONG ]]; then
              break
            fi
            sleep 1
          done
          [[ "$("${redis_cli[@]}" GET ryframe:release:persistence)" == survived ]]
          "${redis_cli[@]}" DEL ryframe:release:persistence >/dev/null

      - name: Source, format, architecture, and deployment checks
        run: |
          python scripts/check_source_hygiene.py
          python scripts/check_permission_routes.py
          python scripts/check_architecture.py
          python -m compileall -q scripts
          python -m unittest discover -s scripts/tests -p 'test_*.py'
          ruby -e 'require "yaml"; ARGV.each { |path| YAML.parse_file(path) }' \
            .github/workflows/ci.yml .github/workflows/release.yml docker-compose.test.yml
          docker compose -f docker-compose.test.yml config --quiet
          cargo fmt --all -- --check
          mapfile -t shell_scripts < <(find deploy -type f -name '*.sh' -print)
          bash -n deploy.sh "${shell_scripts[@]}"
          shellcheck deploy.sh "${shell_scripts[@]}"
          bash deploy/tests/validate-nginx.sh

      - name: Verify generated API and MySQL schema snapshots
        run: |
          cargo run --locked -p ryframe-api --bin export_openapi -- openapi/openapi.json
          git diff --exit-code -- openapi/openapi.json
          cargo run --locked -p ryframe-db-migration --bin export_mysql_snapshot -- sql/ryframe_config.sql
          git diff --exit-code -- sql/ryframe_config.sql
          test ! -d sql/migrations || test -z "$(find sql/migrations -type f -print -quit)"

      - name: Clippy and all-target build
        run: |
          cargo clippy --locked --workspace --all-targets -- -D warnings
          cargo check --locked --workspace --all-targets

      - name: Run the full MySQL test suite
        run: cargo nextest run --locked --workspace --no-fail-fast

      - name: Test authoritative force logout and Redis recovery
        run: >-
          cargo test --locked -p ryframe-api --test integration_test
          force_logout_uses_authoritative_family_and_recovers_after_redis_failure
          -- --ignored --exact

      - name: Test authentication fail-closed behavior during Redis outage
        run: >-
          cargo test --locked -p ryframe-api --test integration_test
          auth_middleware_fails_closed_when_redis_is_unavailable
          -- --ignored --exact

      - name: Test Redis refresh rotation CAS and response-loss recovery
        run: >-
          cargo test --locked -p ryframe-core --test refresh_session_redis_test
          -- --ignored

      - name: Run documentation tests
        run: cargo test --locked --workspace --doc

      - name: Run object-storage smoke test
        run: >-
          cargo test --locked -p ryframe-storage --test object_storage_test
          test_s3_integration_put_get_delete -- --ignored --exact

      - name: Seed legacy tables for whole-database reset acceptance
        shell: bash
        env:
          MYSQL_PWD: ${{ env.APP_DATABASE_PASSWORD }}
        run: |
          mysql --protocol=TCP \
            --host="$APP_DATABASE_HOST" \
            --port="$APP_DATABASE_PORT" \
            --user="$APP_DATABASE_USERNAME" \
            "$APP_DATABASE_NAME" <<'SQL'
          CREATE TABLE sys_job (id BIGINT NOT NULL PRIMARY KEY);
          CREATE TABLE sys_job_log (
            id BIGINT NOT NULL PRIMARY KEY,
            job_id BIGINT NOT NULL,
            CONSTRAINT fk_reset_legacy_job
              FOREIGN KEY (job_id) REFERENCES sys_job(id)
          );
          INSERT INTO sys_job (id) VALUES (1);
          INSERT INTO sys_job_log (id, job_id) VALUES (1, 1);
          SQL

      - name: Initialize through Migrator and Seeder
        run: >-
          cargo run --locked -p ryframe --bin ryframe-db-reset --
          --database ryframe_test
          --confirm-reset RESET-RYFRAME-DATABASE

      - name: Verify whole-database reset result
        shell: bash
        env:
          MYSQL_PWD: ${{ env.APP_DATABASE_PASSWORD }}
        run: |
          mysql_args=(
            --protocol=TCP
            --host="$APP_DATABASE_HOST"
            --port="$APP_DATABASE_PORT"
            --user="$APP_DATABASE_USERNAME"
            --batch
            --skip-column-names
          )
          legacy_count="$(mysql "${mysql_args[@]}" -e \
            "SELECT COUNT(*) FROM information_schema.tables WHERE table_schema='$APP_DATABASE_NAME' AND table_name IN ('sys_job','sys_job_log')")"
          [[ "$legacy_count" == 0 ]]
          canonical_count="$(mysql "${mysql_args[@]}" -e \
            "SELECT COUNT(*) FROM information_schema.tables WHERE table_schema='$APP_DATABASE_NAME' AND table_name IN ('seaql_migrations','sys_tenant','sys_user')")"
          [[ "$canonical_count" == 3 ]]
          user_count="$(mysql "${mysql_args[@]}" "$APP_DATABASE_NAME" -e \
            "SELECT COUNT(*) FROM sys_user WHERE tenant_id='system' AND username IN ('admin','user')")"
          [[ "$user_count" == 2 ]]
          database_metadata="$(mysql "${mysql_args[@]}" -e \
            "SELECT CONCAT(default_character_set_name, ':', default_collation_name) FROM information_schema.schemata WHERE schema_name='$APP_DATABASE_NAME'")"
          [[ "$database_metadata" == utf8mb4:utf8mb4_general_ci ]]

      - name: Run application and dependency-failure smoke suite
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p target
          cargo run --locked -p ryframe --bin ryframe > target/release-runtime.log 2>&1 &
          server_pid=$!
          cleanup_server() { kill "$server_pid" 2>/dev/null || true; }
          trap cleanup_server EXIT

          for attempt in $(seq 1 90); do
            if curl --fail --silent --max-time 3 http://127.0.0.1:18080/readyz >/dev/null; then
              break
            fi
            if ! kill -0 "$server_pid" 2>/dev/null; then
              cat target/release-runtime.log
              exit 1
            fi
            sleep 2
          done

          curl --fail --silent --max-time 3 http://127.0.0.1:18080/livez >/dev/null
          curl --fail --silent --max-time 3 http://127.0.0.1:18080/readyz >/dev/null
          [[ "$(curl --silent --max-time 3 --output /dev/null --write-out '%{http_code}' http://127.0.0.1:18080/health)" == 404 ]]
          node deploy/tests/smoke-test.js http://127.0.0.1:18080

          if grep --extended-regexp '(^|[[:space:]])(WARN|ERROR)([[:space:]]|$)' target/release-runtime.log; then
            cat target/release-runtime.log
            exit 1
          fi

          docker compose -f docker-compose.test.yml stop redis
          for attempt in $(seq 1 30); do
            live_status="$(curl --silent --max-time 3 --output /dev/null --write-out '%{http_code}' http://127.0.0.1:18080/livez || true)"
            ready_status="$(curl --silent --max-time 3 --output /dev/null --write-out '%{http_code}' http://127.0.0.1:18080/readyz || true)"
            if [[ "$live_status" == 200 && "$ready_status" == 503 ]]; then
              break
            fi
            sleep 1
          done
          [[ "$live_status" == 200 ]]
          [[ "$ready_status" == 503 ]]

          docker compose -f docker-compose.test.yml start redis
          recovered=false
          for attempt in $(seq 1 60); do
            if curl --fail --silent --max-time 3 http://127.0.0.1:18080/readyz >/dev/null; then
              recovered=true
              break
            fi
            sleep 1
          done
          [[ "$recovered" == true ]]

      - name: Validate backup and temporary-database restore
        run: |
          bash deploy.sh backup
          bash deploy.sh validate "$BACKUP_DIR/ryframe_test_latest.sql.gz"
          bash deploy.sh rehearse "$BACKUP_DIR/ryframe_test_latest.sql.gz"

      - name: Audit dependencies and licenses
        run: |
          cargo audit --deny warnings
          cargo deny check licenses
          cargo deny check bans sources

      - name: Stop test services
        if: always()
        run: docker compose -f docker-compose.test.yml down --volumes

  frontend-gate:
    name: Frontend contract, quality, E2E, and bundle gate
    needs: validate-release
    runs-on: ubuntu-latest
    steps:
      - name: Check out backend contract
        uses: actions/checkout@v6

      - name: Check out matching frontend tag
        uses: actions/checkout@v6
        with:
          repository: Edgar-ycy/ryframe-vue3
          ref: ${{ needs.validate-release.outputs.tag }}
          path: frontend

      - name: Set up pinned pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.28.2

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install locked dependencies
        working-directory: frontend
        run: pnpm install --frozen-lockfile

      - name: Install Playwright Chromium
        working-directory: frontend
        run: pnpm exec playwright install --with-deps chromium

      - name: Verify the cross-repository contract
        run: cmp openapi/openapi.json frontend/openapi/openapi.json

      - name: Run complete frontend release gate
        working-directory: frontend
        env:
          VITE_APP_BASE_API: /api/v1
        run: pnpm check

  stable-approval:
    name: Approve stable promotion
    if: ${{ needs.validate-release.outputs.prerelease == 'false' }}
    needs:
      - validate-release
      - backend-gate
      - frontend-gate
    runs-on: ubuntu-latest
    environment:
      name: stable-release
    steps:
      - name: Record protected environment approval
        run: |
          echo "stable-release required-reviewer approval granted for $GITHUB_REF_NAME"

  publish-release:
    name: Publish source-only GitHub release
    needs:
      - validate-release
      - backend-gate
      - frontend-gate
      - stable-approval
    if: >-
      ${{
        always() &&
        needs.validate-release.result == 'success' &&
        needs.backend-gate.result == 'success' &&
        needs.frontend-gate.result == 'success' &&
        (needs.validate-release.outputs.prerelease == 'true' ||
         needs.stable-approval.result == 'success')
      }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - name: Purge custom assets from target release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          release_json="$RUNNER_TEMP/release.json"
          release_error="$RUNNER_TEMP/release-error.log"
          if gh api \
            "repos/${GITHUB_REPOSITORY}/releases/tags/${GITHUB_REF_NAME}" \
            > "$release_json" 2> "$release_error"; then
            release_id="$(jq -r '.id' "$release_json")"
            gh api --paginate \
              "repos/${GITHUB_REPOSITORY}/releases/${release_id}/assets?per_page=100" \
              --jq '.[].id' > "$RUNNER_TEMP/release-asset-ids.txt"
            while IFS= read -r asset_id; do
              [[ -n "$asset_id" ]] || continue
              gh api --method DELETE \
                "repos/${GITHUB_REPOSITORY}/releases/assets/${asset_id}"
            done < "$RUNNER_TEMP/release-asset-ids.txt"
          elif grep --quiet 'HTTP 404' "$release_error"; then
            echo "No existing release assets to remove for $GITHUB_REF_NAME."
          else
            cat "$release_error" >&2
            exit 1
          fi

      - name: Extract exact changelog section
        shell: bash
        env:
          STABLE_TAG: ${{ needs.validate-release.outputs.stable_tag }}
          RELEASE_TAG: ${{ needs.validate-release.outputs.tag }}
          PRERELEASE: ${{ needs.validate-release.outputs.prerelease }}
        run: |
          set -euo pipefail
          awk -v version="$STABLE_TAG" '
            index($0, "## [" version "]") == 1 { found=1; next }
            found && /^## \[/ { exit }
            found { print }
            END { if (!found) exit 2 }
          ' CHANGELOG.md > release_body.md
          test -s release_body.md
          if [[ "$PRERELEASE" == true ]]; then
            {
              printf '# Release candidate %s\n\n' "$RELEASE_TAG"
              printf 'This candidate must complete at least 48 hours of RC observation before stable promotion.\n\n'
              cat release_body.md
            } > release_body.rc.md
            mv release_body.rc.md release_body.md
          fi

      - name: Create source-only GitHub release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ needs.validate-release.outputs.tag }}
          name: RyFrame ${{ needs.validate-release.outputs.tag }}
          body_path: release_body.md
          prerelease: ${{ needs.validate-release.outputs.prerelease == 'true' }}
          make_latest: ${{ needs.validate-release.outputs.prerelease == 'false' }}
