name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  CARGO_HTTP_TIMEOUT: "600"
  CARGO_NET_RETRY: "5"

jobs:
  # ============================================================
  # 代码质量门禁
  # ============================================================
  check:
    name: Check & Lint
    runs-on: ubuntu-latest
    env:
      RUSTFLAGS: "-Dwarnings"
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "."
          prefix-key: "v1-rust"

      - name: Check formatting
        run: cargo fmt --all -- --check

      # push: 仅 lib (快) / PR: 全量 (全面)
      - name: Clippy (all targets)
        if: github.event_name == 'pull_request'
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Clippy (lib only)
        if: github.event_name != 'pull_request'
        run: cargo clippy --workspace --lib -- -D warnings

      - name: Check build (all targets)
        if: github.event_name == 'pull_request'
        run: cargo check --workspace --all-targets

      - name: Check build (lib only)
        if: github.event_name != 'pull_request'
        run: cargo check --workspace --lib

  # ============================================================
  # 安全检查
  # ============================================================
  security-audit:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Run cargo audit
        uses: rustsec/audit-check@v2.0.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install cargo-deny
        uses: taiki-e/install-action@cargo-deny

      - name: License check
        run: cargo deny check licenses
        continue-on-error: true

  # ============================================================
  # 快速测试 (Linux, nextest 并行)
  # ============================================================
  test:
    name: Test (Linux)
    runs-on: ubuntu-latest
    needs: check
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "."

      - name: Install cargo-nextest
        uses: taiki-e/install-action@nextest

      - name: Run tests (nextest)
        run: cargo nextest run --workspace --no-fail-fast --retries 2

      - name: Run doc-tests (nextest 不支持)
        run: cargo test --workspace --doc

  # ============================================================
  # 覆盖率检查 (仅 PR)
  # ============================================================
  coverage:
    name: Coverage (PR only)
    runs-on: ubuntu-latest
    needs: check
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "."

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov

      - name: Run tests with coverage
        run: cargo llvm-cov --workspace --lcov --output-path lcov.info --fail-under-lines 60
        continue-on-error: true

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: lcov.info
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}

  # ============================================================
  # Windows 测试 (仅 PR)
  # ============================================================
  test-windows:
    name: Test (Windows)
    runs-on: windows-latest
    needs: check
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "."

      - name: Install cargo-nextest
        uses: taiki-e/install-action@nextest

      - name: Run tests
        run: cargo nextest run --workspace --no-fail-fast --retries 2
