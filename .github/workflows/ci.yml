name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  CARGO_HTTP_TIMEOUT: "600"
  CARGO_NET_RETRY: "5"
  GIT_CONFIG_COUNT: "1"
  GIT_CONFIG_KEY_0: init.defaultBranch
  GIT_CONFIG_VALUE_0: main
  RUSTDOCFLAGS: "-Dwarnings"

jobs:
  # ============================================================
  # 代码质量门禁
  # ============================================================
  check:
    name: Check & Lint
    runs-on: ubuntu-latest
    env:
      RUSTFLAGS: "-Dwarnings"
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Rust cache
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: v2-rust-${{ runner.os }}-${{ runner.arch }}-${{ github.job }}-${{ hashFiles('**/Cargo.lock', '**/Cargo.toml') }}
          restore-keys: |
            v2-rust-${{ runner.os }}-${{ runner.arch }}-${{ github.job }}-
            v2-rust-${{ runner.os }}-${{ runner.arch }}-

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Check source encoding and structure
        run: python scripts/check_source_hygiene.py

      - name: Reject unreviewed prerelease dependencies
        run: python scripts/check_prerelease_dependencies.py

      - name: Check permission bindings
        run: python scripts/check_permission_routes.py

      - name: Check architecture boundaries
        run: python scripts/check_architecture.py

      - name: Validate deployment scripts
        run: |
          mapfile -t shell_scripts < <(find deploy -type f -name '*.sh' -print)
          bash -n deploy.sh "${shell_scripts[@]}"
          shellcheck deploy.sh "${shell_scripts[@]}"
          docker compose -f docker-compose.test.yml config --quiet
          bash deploy/tests/validate-nginx.sh

      - name: Validate workflow YAML and release tooling
        run: |
          ruby -e 'require "yaml"; ARGV.each { |path| YAML.parse_file(path) }' \
            .github/workflows/ci.yml \
            .github/workflows/auto-promote.yml \
            .github/workflows/release.yml \
            .github/workflows/nightly.yml \
            docker-compose.test.yml
          python -m compileall -q scripts
          python -m unittest discover -s scripts/tests -p 'test_*.py'

      - name: Check OpenAPI contract snapshot
        run: |
          cargo run --locked -p ryframe-api --bin export_openapi -- openapi/openapi.json
          git diff --exit-code -- openapi/openapi.json

      - name: Check generated MySQL schema snapshot
        run: |
          cargo run --locked -p ryframe-db-migration --bin export_mysql_snapshot -- sql/ryframe_config.sql
          git diff --exit-code -- sql/ryframe_config.sql
          test ! -d sql/migrations || test -z "$(find sql/migrations -type f -print -quit)"

      - name: Upload OpenAPI contract
        uses: actions/upload-artifact@v6
        with:
          name: ryframe-openapi
          path: openapi/openapi.json
          if-no-files-found: error

      # Keep every event at the same all-targets quality bar.
      - name: Clippy (all targets)
        run: cargo clippy --locked --workspace --all-targets -- -D warnings

      - name: Check build (all targets)
        run: cargo check --locked --workspace --all-targets

  # ============================================================
  # 安全检查
  # ============================================================
  security-audit:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-audit
        uses: taiki-e/install-action@cargo-audit

      - name: Run cargo audit
        run: cargo audit --deny warnings

      - name: Install cargo-deny
        uses: taiki-e/install-action@cargo-deny

      - name: License check
        run: cargo deny check licenses

      - name: Bans & Sources check
        run: cargo deny check bans sources

  # ============================================================
  # 快速测试（Linux，nextest 并行）
  # ============================================================
  test:
    name: Test (Linux)
    runs-on: ubuntu-latest
    needs: check
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: v2-rust-${{ runner.os }}-${{ runner.arch }}-${{ github.job }}-${{ hashFiles('**/Cargo.lock', '**/Cargo.toml') }}
          restore-keys: |
            v2-rust-${{ runner.os }}-${{ runner.arch }}-${{ github.job }}-
            v2-rust-${{ runner.os }}-${{ runner.arch }}-

      - name: Install cargo-nextest
        uses: taiki-e/install-action@nextest

      - name: Start MySQL, Redis, and object storage
        run: docker compose -f docker-compose.test.yml up --detach --wait

      - name: Run tests (nextest)
        run: cargo nextest run --locked --workspace --no-fail-fast --retries 2

      - name: Run doctests
        run: cargo test --locked --workspace --doc

      - name: Stop test services
        if: always()
        run: docker compose -f docker-compose.test.yml down --volumes

  # ============================================================
  # 真实服务运行时冒烟测试
  # ============================================================
  runtime-smoke:
    name: Runtime Smoke
    runs-on: ubuntu-latest
    needs: check
    env:
      RUSTFLAGS: "-Dwarnings"
      APP_ENV: dev
      APP_APP_PORT: "18080"
      APP_DATABASE_HOST: 127.0.0.1
      APP_DATABASE_PORT: "13306"
      APP_DATABASE_NAME: ryframe_test
      APP_DATABASE_USERNAME: root
      APP_DATABASE_PASSWORD: ryframe_test_password
      APP_DATABASE_REPLICAS: "[]"
      APP_DATABASE_SOURCES: "[]"
      APP_GENERATOR_DATA_SOURCE: primary
      RYFRAME_PRIMARY_DATABASE_URL: mysql://root:ryframe_test_password@127.0.0.1:13306/ryframe_test
      RYFRAME_TEST_MYSQL_ADMIN_URL: mysql://root:ryframe_test_password@127.0.0.1:13306/mysql
      APP_REDIS_MODE: required
      APP_REDIS_HOST: 127.0.0.1
      APP_REDIS_PORT: "16379"
      RYFRAME_TEST_REDIS_PORT: "16379"
      APP_OBJECT_STORAGE_BACKEND: rustfs
      APP_OBJECT_STORAGE_ENDPOINT: http://127.0.0.1:19000
      APP_OBJECT_STORAGE_ACCESS_KEY: ryframe-test-access
      APP_OBJECT_STORAGE_SECRET_KEY: ryframe-test-secret-2026
      APP_OBJECT_STORAGE_REGION: us-east-1
      ADMIN_USER: admin
      ADMIN_PASS: "123456"
      TENANT_ID: system
    steps:
      - uses: actions/checkout@v6

      - name: Install MySQL client for backup rehearsal
        run: |
          sudo apt-get update
          sudo apt-get install --yes default-mysql-client

      - name: Start runtime services
        shell: bash
        run: |
          set -euo pipefail
          sudo sysctl -w vm.overcommit_memory=1 >/dev/null
          docker compose -f docker-compose.test.yml up --detach --wait

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Rust cache
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: v2-rust-${{ runner.os }}-${{ runner.arch }}-${{ github.job }}-${{ hashFiles('**/Cargo.lock', '**/Cargo.toml') }}
          restore-keys: |
            v2-rust-${{ runner.os }}-${{ runner.arch }}-${{ github.job }}-
            v2-rust-${{ runner.os }}-${{ runner.arch }}-

      - name: Test authoritative force logout and Redis recovery
        run: >-
          cargo test --locked -p ryframe-api --test integration_test
          force_logout_uses_authoritative_family_and_recovers_after_redis_failure
          -- --ignored --exact

      - name: Test authentication fail-closed behavior during Redis outage
        run: >-
          cargo test --locked -p ryframe-api --test integration_test
          auth_middleware_fails_closed_when_redis_is_unavailable
          -- --ignored --exact

      - name: Test Redis refresh rotation CAS and response-loss recovery
        run: >-
          cargo test --locked -p ryframe-core --test refresh_session_redis_test
          -- --ignored

      - name: Seed legacy tables for whole-database reset acceptance
        shell: bash
        env:
          MYSQL_PWD: ${{ env.APP_DATABASE_PASSWORD }}
        run: |
          mysql --protocol=TCP \
            --host="$APP_DATABASE_HOST" \
            --port="$APP_DATABASE_PORT" \
            --user="$APP_DATABASE_USERNAME" \
            "$APP_DATABASE_NAME" <<'SQL'
          CREATE TABLE sys_job (id BIGINT NOT NULL PRIMARY KEY);
          CREATE TABLE sys_job_log (
            id BIGINT NOT NULL PRIMARY KEY,
            job_id BIGINT NOT NULL,
            CONSTRAINT fk_reset_legacy_job
              FOREIGN KEY (job_id) REFERENCES sys_job(id)
          );
          INSERT INTO sys_job (id) VALUES (1);
          INSERT INTO sys_job_log (id, job_id) VALUES (1, 1);
          SQL

      - name: Initialize smoke database
        run: >-
          cargo run --locked -p ryframe --bin ryframe-db-reset --
          --database ryframe_test
          --confirm-reset RESET-RYFRAME-DATABASE

      - name: Verify whole-database reset result
        shell: bash
        env:
          MYSQL_PWD: ${{ env.APP_DATABASE_PASSWORD }}
        run: |
          mysql_args=(
            --protocol=TCP
            --host="$APP_DATABASE_HOST"
            --port="$APP_DATABASE_PORT"
            --user="$APP_DATABASE_USERNAME"
            --batch
            --skip-column-names
          )
          legacy_count="$(mysql "${mysql_args[@]}" -e \
            "SELECT COUNT(*) FROM information_schema.tables WHERE table_schema='$APP_DATABASE_NAME' AND table_name IN ('sys_job','sys_job_log')")"
          [[ "$legacy_count" == 0 ]]
          canonical_count="$(mysql "${mysql_args[@]}" -e \
            "SELECT COUNT(*) FROM information_schema.tables WHERE table_schema='$APP_DATABASE_NAME' AND table_name IN ('seaql_migrations','sys_tenant','sys_user')")"
          [[ "$canonical_count" == 3 ]]
          user_count="$(mysql "${mysql_args[@]}" "$APP_DATABASE_NAME" -e \
            "SELECT COUNT(*) FROM sys_user WHERE tenant_id='system' AND username IN ('admin','user')")"
          [[ "$user_count" == 2 ]]
          database_metadata="$(mysql "${mysql_args[@]}" -e \
            "SELECT CONCAT(default_character_set_name, ':', default_collation_name) FROM information_schema.schemata WHERE schema_name='$APP_DATABASE_NAME'")"
          [[ "$database_metadata" == utf8mb4:utf8mb4_general_ci ]]

      - name: Wait for RustFS
        shell: bash
        run: |
          for attempt in $(seq 1 60); do
            if curl --fail --silent http://127.0.0.1:19000/health >/dev/null; then
              exit 0
            fi
            sleep 2
          done
          echo "RustFS did not become reachable"
          exit 1

      - name: Test RustFS adapter
        run: >-
          cargo test --locked -p ryframe-storage --test object_storage_test
          test_s3_integration_put_get_delete -- --ignored --exact

      - name: Start service and run smoke tests
        shell: bash
        run: |
          mkdir -p target
          cargo run --locked -p ryframe --bin ryframe > target/runtime-smoke.log 2>&1 &
          server_pid=$!
          cleanup() { kill "$server_pid" 2>/dev/null || true; }
          trap cleanup EXIT

          for attempt in $(seq 1 60); do
            if curl --fail --silent http://127.0.0.1:18080/readyz >/dev/null; then
              break
            fi
            if ! kill -0 "$server_pid" 2>/dev/null; then
              cat target/runtime-smoke.log
              exit 1
            fi
            sleep 2
          done

          curl --fail --silent http://127.0.0.1:18080/readyz >/dev/null
          node deploy/tests/smoke-test.js http://127.0.0.1:18080

      - name: Validate backup and restore rehearsal
        env:
          DB_HOST: 127.0.0.1
          DB_PORT: "13306"
          DB_NAME: ryframe_test
          DB_USER: root
          DB_PASSWORD: ryframe_test_password
          BACKUP_DIR: target/ci-backups
        run: |
          bash deploy.sh backup
          bash deploy.sh validate target/ci-backups/ryframe_test_latest.sql.gz
          bash deploy.sh rehearse target/ci-backups/ryframe_test_latest.sql.gz

          if grep -E '(^|[[:space:]])(WARN|ERROR)([[:space:]]|$)' target/runtime-smoke.log; then
            cat target/runtime-smoke.log
            echo "Runtime log contains warnings or errors"
            exit 1
          fi

      - name: Upload runtime log on failure
        if: failure() && hashFiles('target/runtime-smoke.log') != ''
        uses: actions/upload-artifact@v6
        with:
          name: runtime-smoke-log
          path: target/runtime-smoke.log
          if-no-files-found: error

      - name: Check runtime service logs
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          status=0
          for service in mysql redis rustfs; do
            if ! docker compose -f docker-compose.test.yml ps --status running "$service" \
              | grep --quiet "$service"; then
              echo "$service is unavailable"
              status=1
              continue
            fi

            logs="$(docker compose -f docker-compose.test.yml logs --no-color "$service" 2>&1)"
            if grep --extended-regexp --ignore-case \
              '(^|[[:space:][:punct:]])(warn(ing)?|error)([[:space:][:punct:]]|$)' \
              <<<"$logs"; then
              printf '%s\n' "$logs"
              echo "$service emitted a diagnostic"
              status=1
            fi
          done
          exit "$status"

      - name: Stop runtime services
        if: always()
        shell: bash
        run: docker compose -f docker-compose.test.yml down --volumes

  # ============================================================
  # 覆盖率检查
  # ============================================================
  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    needs: check
    env:
      CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview

      - name: Rust cache
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: v2-rust-${{ runner.os }}-${{ runner.arch }}-${{ github.job }}-${{ hashFiles('**/Cargo.lock', '**/Cargo.toml') }}
          restore-keys: |
            v2-rust-${{ runner.os }}-${{ runner.arch }}-${{ github.job }}-
            v2-rust-${{ runner.os }}-${{ runner.arch }}-

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov

      - name: Start MySQL, Redis, and object storage
        run: docker compose -f docker-compose.test.yml up --detach --wait

      - name: Run tests with coverage
        # Current full-workspace baseline is 69.06%; keep a strict but achievable
        # floor and raise it as repository/service integration coverage grows.
        run: cargo llvm-cov --locked --workspace --lcov --output-path lcov.info --fail-under-lines 55

      - name: Stop coverage services
        if: always()
        run: docker compose -f docker-compose.test.yml down --volumes

      - name: Upload coverage to Codecov
        if: env.CODECOV_TOKEN != ''
        uses: codecov/codecov-action@v5
        with:
          files: lcov.info
          fail_ci_if_error: true
          token: ${{ env.CODECOV_TOKEN }}

  # ============================================================
  # Windows tests
  # ============================================================
  test-windows:
    name: Test (Windows)
    runs-on: windows-latest
    needs: check
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: v2-rust-${{ runner.os }}-${{ runner.arch }}-${{ github.job }}-${{ hashFiles('**/Cargo.lock', '**/Cargo.toml') }}
          restore-keys: |
            v2-rust-${{ runner.os }}-${{ runner.arch }}-${{ github.job }}-
            v2-rust-${{ runner.os }}-${{ runner.arch }}-

      - name: Install cargo-nextest
        uses: taiki-e/install-action@nextest

      - name: Compile all tests
        run: cargo test --locked --workspace --no-run

      - name: Run doctests
        run: cargo test --locked --workspace --doc
