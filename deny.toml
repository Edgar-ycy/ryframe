# cargo-deny configuration for RyFrame
# Run: cargo deny check

[graph]
all-features = false
no-default-features = false

[advisories]
db-path = "$CARGO_HOME/advisory-dbs"
db-urls = ["https://github.com/rustsec/advisory-db"]
ignore = []

[licenses]
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "0BSD",
    "ISC",
    "Unicode-3.0",
    "Zlib",
    "BSL-1.0",
    "CC0-1.0",
    "CDLA-Permissive-2.0",
    "MPL-2.0",
    "NCSA",
    "bzip2-1.0.6",
]

[[licenses.clarify]]
# ring is used by rustls / jsonwebtoken and has a non-standard license
crate = "ring"
expression = "MIT AND ISC AND OpenSSL"
license-files = [{ path = "LICENSE", hash = 0xbd0eed23 }]

[bans]
# Duplicate transitive versions are reported by dependency updates instead of
# emitting non-actionable CI warnings. Explicit bans and source checks remain strict.
multiple-versions = "allow"
deny = []
skip = []
skip-tree = []

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-git = []
