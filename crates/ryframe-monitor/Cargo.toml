[package]
name = "ryframe-monitor"
version.workspace = true
edition.workspace = true
authors.workspace = true
license.workspace = true
repository.workspace = true
description.workspace = true

[dependencies]
ryframe-common = { path = "../ryframe-common" }
ryframe-core = { path = "../ryframe-core" }
ryframe-middleware = { path = "../ryframe-middleware" }
# Required by the #[perm] route expansion generated by ryframe-macro.
ryframe-auth = { path = "../ryframe-auth" }
ryframe-macro = { path = "../ryframe-macro" }
serde = { workspace = true, features = ["derive"] }
sysinfo = { workspace = true }
axum = { workspace = true }
serde_json = { workspace = true }
chrono = { workspace = true }
redis = { workspace = true }
tracing = { workspace = true }
utoipa = { workspace = true }
tokio = { workspace = true, features = ["rt"] }

[dev-dependencies]
tokio = { workspace = true, features = ["macros", "rt"] }
