version: "3.8"

services:
  # ============================================================
  # RyFrame 应用
  # ============================================================
  ryframe:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ryframe-app
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      - APP_ENV=prod
      - APP_DATABASE_PRIMARY_HOST=mysql
      - APP_DATABASE_PRIMARY_PORT=3306
      - APP_DATABASE_PRIMARY_DATABASE=ryframe_config
      - APP_DATABASE_PRIMARY_USERNAME=root
      - APP_DATABASE_PRIMARY_PASSWORD=${MYSQL_ROOT_PASSWORD:-ryframe2024}
      - APP_REDIS_HOST=redis
      - APP_REDIS_PORT=6379
      - APP_AUTH_JWT_SECRET=${JWT_SECRET:-please-change-this-secret-key-in-production}
      - APP_LOGGER_LEVEL=info
      - APP_LOGGER_FORMAT=json
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - ryframe-net
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ============================================================
  # MySQL 数据库
  # ============================================================
  mysql:
    image: mysql:8.0
    container_name: ryframe-mysql
    restart: unless-stopped
    ports:
      - "3306:3306"
    environment:
      - MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD:-ryframe2024}
      - MYSQL_DATABASE=ryframe_config
      - TZ=Asia/Shanghai
    volumes:
      - mysql_data:/var/lib/mysql
      - ./sql:/docker-entrypoint-initdb.d:ro
    command: >
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
      --default-authentication-plugin=mysql_native_password
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD:-ryframe2024}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - ryframe-net

  # ============================================================
  # Redis 缓存
  # ============================================================
  redis:
    image: redis:7-alpine
    container_name: ryframe-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ryframe-net

  # ============================================================
  # Nginx 反向代理（可选）
  # ============================================================
  nginx:
    image: nginx:alpine
    container_name: ryframe-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./deploy/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - ryframe
    networks:
      - ryframe-net

volumes:
  mysql_data:
    driver: local
  redis_data:
    driver: local

networks:
  ryframe-net:
    driver: bridge
