# RyFrame v0.5 production template.
# This file is intended to be included from nginx's `http` block.
# Replace example.com and certificate paths before enabling it.

limit_req_zone $binary_remote_addr zone=ryframe_api:10m rate=30r/s;
limit_req_zone $binary_remote_addr zone=ryframe_login:10m rate=5r/m;
limit_conn_zone $binary_remote_addr zone=ryframe_connections:10m;

upstream ryframe_backend {
    least_conn;
    server 127.0.0.1:8080 max_fails=3 fail_timeout=30s;
    # Add the blue/green peer only while switching releases.
    # server 127.0.0.1:8081 max_fails=3 fail_timeout=30s;
    keepalive 32;
}

server {
    listen 80;
    listen [::]:80;
    server_name admin.example.com api.example.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 308 https://$host$request_uri;
    }
}

# Management SPA. The API is deliberately not proxied from this host so that
# the refresh cookie remains host-only on api.example.com.
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name admin.example.com;

    ssl_certificate /etc/letsencrypt/live/example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/example.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_session_cache shared:RYFRAME_SSL:10m;
    ssl_session_timeout 1d;

    root /var/www/ryframe/frontend;
    index index.html;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    add_header Content-Security-Policy "default-src 'self'; base-uri 'self'; object-src 'none'; frame-ancestors 'none'; form-action 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob: https://api.example.com; font-src 'self' data:; connect-src 'self' https://api.example.com; upgrade-insecure-requests" always;

    gzip on;
    gzip_vary on;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types text/plain text/css application/json application/javascript image/svg+xml;

    location ~* ^/assets/.+\.(?:js|css|woff2?|ttf|svg|png|jpe?g|webp|ico)$ {
        try_files $uri =404;
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
        add_header Content-Security-Policy "default-src 'self'; base-uri 'self'; object-src 'none'; frame-ancestors 'none'; form-action 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob: https://api.example.com; font-src 'self' data:; connect-src 'self' https://api.example.com; upgrade-insecure-requests" always;
    }

    location = /index.html {
        add_header Cache-Control "no-store" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
        add_header Content-Security-Policy "default-src 'self'; base-uri 'self'; object-src 'none'; frame-ancestors 'none'; form-action 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob: https://api.example.com; font-src 'self' data:; connect-src 'self' https://api.example.com; upgrade-insecure-requests" always;
    }

    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
        add_header Content-Security-Policy "default-src 'self'; base-uri 'self'; object-src 'none'; frame-ancestors 'none'; form-action 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob: https://api.example.com; font-src 'self' data:; connect-src 'self' https://api.example.com; upgrade-insecure-requests" always;
    }

    location ~ /\. {
        deny all;
    }
}

# API host. Nginx terminates TLS and overwrites all forwarding headers. Never
# use $proxy_add_x_forwarded_for here: untrusted client-supplied XFF must not be
# appended to the trusted chain.
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name api.example.com;

    ssl_certificate /etc/letsencrypt/live/example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/example.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_session_cache shared:RYFRAME_SSL:10m;
    ssl_session_timeout 1d;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "no-referrer" always;

    limit_req_status 429;
    error_page 429 = @nginx_rate_limited;

    location @nginx_rate_limited {
        default_type application/json;
        add_header Retry-After "60" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header Referrer-Policy "no-referrer" always;
        return 429 '{"code":429,"msg":"too many requests"}';
    }

    # 64 KiB is reserved for the multipart envelope; business validation still
    # caps the uploaded file itself at exactly 10 MiB (5 MiB for avatars).
    client_max_body_size 10304k;
    client_body_timeout 30s;
    client_header_timeout 10s;
    send_timeout 30s;

    # Probes bypass application and Nginx business rate limits.
    location = /livez {
        proxy_pass http://ryframe_backend;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Forwarded-Proto https;
        access_log off;
    }

    location = /readyz {
        proxy_pass http://ryframe_backend;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Forwarded-Proto https;
        access_log off;
    }

    location = /api/v1/auth/login {
        limit_req zone=ryframe_login burst=3 nodelay;
        limit_conn ryframe_connections 5;
        proxy_pass http://ryframe_backend;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Forwarded-Proto https;
        proxy_connect_timeout 10s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;
    }

    # Authenticated file uploads and imports use the longer upload timeout.
    location ^~ /api/v1/common/upload {
        limit_req zone=ryframe_api burst=10 nodelay;
        limit_conn ryframe_connections 10;
        client_max_body_size 10304k;
        client_body_timeout 120s;
        proxy_request_buffering on;
        proxy_pass http://ryframe_backend;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Forwarded-Proto https;
        proxy_connect_timeout 10s;
        proxy_send_timeout 120s;
        proxy_read_timeout 120s;
    }

    location = /api/v1/auth/profile/avatar {
        limit_req zone=ryframe_api burst=5 nodelay;
        client_max_body_size 5184k;
        client_body_timeout 120s;
        proxy_request_buffering on;
        proxy_pass http://ryframe_backend;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Forwarded-Proto https;
        proxy_connect_timeout 10s;
        proxy_send_timeout 120s;
        proxy_read_timeout 120s;
    }

    location = /api/v1/common/upload/avatar {
        limit_req zone=ryframe_api burst=5 nodelay;
        client_max_body_size 5184k;
        client_body_timeout 120s;
        proxy_request_buffering on;
        proxy_pass http://ryframe_backend;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Forwarded-Proto https;
        proxy_connect_timeout 10s;
        proxy_send_timeout 120s;
        proxy_read_timeout 120s;
    }

    location = /api/v1/system/users/import {
        limit_req zone=ryframe_api burst=5 nodelay;
        client_max_body_size 10304k;
        client_body_timeout 120s;
        proxy_request_buffering on;
        proxy_pass http://ryframe_backend;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Forwarded-Proto https;
        proxy_connect_timeout 10s;
        proxy_send_timeout 120s;
        proxy_read_timeout 120s;
    }

    location /api/ {
        limit_req zone=ryframe_api burst=20 nodelay;
        limit_conn ryframe_connections 20;
        proxy_pass http://ryframe_backend;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Forwarded-Proto https;
        proxy_connect_timeout 10s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;
    }

    location / {
        return 404;
    }
}
