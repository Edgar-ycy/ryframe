# ============================================================
# RyFrame Nginx 反向代理配置
#
# 功能：反向代理 + 限流 + 安全头 + 静态资源缓存 + gzip
#
# 使用方式：
#   1. 将本文件复制到 /etc/nginx/sites-available/ryframe
#   2. ln -s /etc/nginx/sites-available/ryframe /etc/nginx/sites-enabled/
#   3. nginx -t && nginx -s reload
# ============================================================

# ============================================================
# 限流区域定义（放在 http 块中）
# 如果已存在，请注释掉下面三行
# ============================================================
# limit_req_zone $binary_remote_addr zone=api_limit:10m rate=30r/s;
# limit_req_zone $binary_remote_addr zone=login_limit:10m rate=5r/m;
# limit_conn_zone $binary_remote_addr zone=conn_limit:10m;

upstream ryframe_backend {
    # 负载均衡策略：least_conn（最少连接数）
    least_conn;

    # RyFrame 实例列表
    server 127.0.0.1:8080 weight=1 max_fails=3 fail_timeout=30s;
    # server 127.0.0.1:8081 weight=1 max_fails=3 fail_timeout=30s;  # 扩展实例

    keepalive 32;
    keepalive_timeout 60s;
    keepalive_requests 100;
}

# ============================================================
# HTTP → HTTPS 重定向（生产环境启用）
# ============================================================
server {
    listen 80;
    server_name _;

    # Let's Encrypt 验证
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # 其余请求重定向到 HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# ============================================================
# HTTPS 主配置
# ============================================================
server {
    # 生产环境取消注释以下两行
    # listen 443 ssl http2;
    # listen [::]:443 ssl http2;

    # 开发环境
    listen 80;
    listen [::]:80;

    server_name _;

    # SSL 证书（生产环境配置）
    # ssl_certificate     /etc/letsencrypt/live/example.com/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/example.com/privkey.pem;
    # ssl_protocols TLSv1.2 TLSv1.3;
    # ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256;
    # ssl_prefer_server_ciphers on;
    # ssl_session_cache shared:SSL:10m;
    # ssl_session_timeout 1d;

    # ========================================
    # 基础配置
    # ========================================
    client_max_body_size 50m;          # 文件上传限制
    client_body_timeout 30s;
    client_header_timeout 10s;
    send_timeout 30s;

    # ========================================
    # gzip 压缩
    # ========================================
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/xml
        application/xml+rss
        image/svg+xml;

    # ========================================
    # 安全响应头
    # ========================================
    # HSTS（生产环境启用，至少 1 年）
    # add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

    # 禁止 MIME 类型嗅探
    add_header X-Content-Type-Options "nosniff" always;

    # 点击劫持防护
    add_header X-Frame-Options "DENY" always;

    # XSS 防护（旧浏览器）
    add_header X-XSS-Protection "1; mode=block" always;

    # Referrer 策略
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # 权限策略
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), interest-cohort=()" always;

    # ========================================
    # 健康检查（不限流）
    # ========================================
    location /health {
        limit_req zone=api_limit burst=0 nodelay;
        limit_conn conn_limit 1;

        proxy_pass http://ryframe_backend;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # 负载均衡健康检查控制
        access_log off;
    }

    # ========================================
    # Prometheus Metrics（仅内部访问）
    # ========================================
    location /api/v1/monitor/metrics {
        # 仅允许内网和监控系统访问
        allow 127.0.0.0/8;
        allow 10.0.0.0/8;
        allow 172.16.0.0/12;
        allow 192.168.0.0/16;
        deny all;

        limit_req zone=api_limit burst=5 nodelay;

        proxy_pass http://ryframe_backend;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        access_log off;
    }

    # ========================================
    # Swagger UI（开发/内网环境）
    # ========================================
    location /api/v1/swagger-ui {
        allow 127.0.0.0/8;
        allow 10.0.0.0/8;
        allow 172.16.0.0/12;
        allow 192.168.0.0/16;
        deny all;

        proxy_pass http://ryframe_backend;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ========================================
    # OpenAPI JSON（可公开）
    # ========================================
    location /api/v1/api-docs/ {
        proxy_pass http://ryframe_backend;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ========================================
    # 登录接口（严格限流）
    # ========================================
    # 头像上传需要经过图片处理、对象存储和数据库写入，使用独立的长超时。
    location = /api/v1/auth/profile/avatar {
        client_max_body_size 5m;
        client_body_timeout 120s;
        proxy_connect_timeout 10s;
        proxy_send_timeout 120s;
        proxy_read_timeout 120s;

        proxy_pass http://ryframe_backend;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/v1/auth/login {
        limit_req zone=login_limit burst=3 nodelay;
        limit_conn conn_limit 5;

        proxy_pass http://ryframe_backend;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # 登录请求单独日志
        access_log /var/log/nginx/ryframe-login.log;
    }

    # ========================================
    # 通用 API 代理
    # ========================================
    location /api/ {
        # 全局限流：30 req/s，突发 20
        limit_req zone=api_limit burst=20 nodelay;
        limit_conn conn_limit 10;

        proxy_pass http://ryframe_backend;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # 请求体大小
        client_max_body_size 50m;
        client_body_buffer_size 128k;
    }

    # ========================================
    # 静态资源缓存
    # ========================================
    # 头像和上传文件
    location /uploads/ {
        alias /var/www/ryframe/uploads/;

        # 缓存策略
        expires 30d;
        add_header Cache-Control "public, immutable";

        # 安全：禁止执行脚本
        location ~* \.(php|jsp|asp|aspx|cgi|pl|py)$ {
            deny all;
        }

        # 图片缓存
        location ~* \.(jpg|jpeg|png|gif|svg|webp|ico)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
            try_files $uri =404;
        }
    }

    # 静态前端资源（如果有 SPA 前端）
    location / {
        root /var/www/ryframe/static;
        index index.html;

        # SPA 回退：找不到文件时返回 index.html
        try_files $uri $uri/ /index.html;

        # JS/CSS 长期缓存
        location ~* \.(js|css)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
            try_files $uri =404;
        }

        # 字体
        location ~* \.(woff|woff2|ttf|eot|otf)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
            add_header Access-Control-Allow-Origin "*";
            try_files $uri =404;
        }
    }

    # ========================================
    # 拒绝隐藏文件访问
    # ========================================
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
}
