# RyFrame Prometheus 抓取配置
#
# 部署：挂载到 prometheus-server 的 /etc/prometheus/ 目录
# 配合 alert-rules.yml（告警规则）和 AlertManager 使用

global:
  scrape_interval: 15s      # 抓取间隔
  evaluation_interval: 15s  # 告警评估间隔
  # AlertManager 地址（集群部署时启用）
  # alerting:
  #   alertmanagers:
  #     - static_configs:
  #         - targets:
  #           - alertmanager:9093

# 告警规则文件
rule_files:
  - "/etc/prometheus/rules/alert-rules.yml"

# 抓取目标
scrape_configs:
  - job_name: "ryframe"
    # metrics 端点路径（应用暴露的 /metrics 端点）
    metrics_path: "/metrics"
    # 静态目标（单实例或多实例）
    static_configs:
      - targets:
          - "ryframe:3000"
        labels:
          app: "ryframe"
          env: "production"

  # 可选的 Prometheus 自身监控
  - job_name: "prometheus"
    static_configs:
      - targets:
          - "localhost:9090"
