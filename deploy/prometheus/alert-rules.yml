# RyFrame AlertManager 告警规则
# 
# 用途：配合 Prometheus + AlertManager 实现自动告警
# 部署：挂载到 prometheus-server 的 /etc/prometheus/rules/ 目录
#
# 注意：所有应用指标均带有 ryframe_ 命名空间前缀（来自自定义 Registry）

groups:
  # ============================================================
  # 1. HTTP 层面告警
  # ============================================================
  - name: ryframe_http_alerts
    rules:
      # --- 5xx 错误率 ---
      - alert: HighErrorRate
        expr: |
          (
            sum(rate(ryframe_http_requests_total{status=~"5.."}[5m])) by (path)
            /
            sum(rate(ryframe_http_requests_total[5m])) by (path)
          ) > 0.05
        for: 2m
        labels:
          severity: critical
          component: api
        annotations:
          summary: "API 5xx 错误率超过 5%"
          description: "路径 {{ $labels.path }} 的 5xx 错误率为 {{ $value | humanizePercentage }}（5分钟均值）"

      # --- 4xx 错误率 ---
      - alert: High4xxRate
        expr: |
          (
            sum(rate(ryframe_http_requests_total{status=~"4.."}[5m])) by (path)
            /
            sum(rate(ryframe_http_requests_total[5m])) by (path)
          ) > 0.20
        for: 5m
        labels:
          severity: warning
          component: api
        annotations:
          summary: "API 4xx 错误率超过 20%"
          description: "路径 {{ $labels.path }} 的 4xx 错误率为 {{ $value | humanizePercentage }}（5分钟均值），可能存在攻击或配置问题"

      # --- P99 延迟 ---
      - alert: HighLatency
        expr: |
          histogram_quantile(0.99, sum(rate(ryframe_http_request_duration_seconds_bucket[5m])) by (le, path)) > 2.0
        for: 3m
        labels:
          severity: warning
          component: api
        annotations:
          summary: "API P99 延迟超过 2 秒"
          description: "路径 {{ $labels.path }} 的 P99 延迟为 {{ $value }}秒"

      # --- P95 延迟严重 ---
      - alert: CriticalLatency
        expr: |
          histogram_quantile(0.95, sum(rate(ryframe_http_request_duration_seconds_bucket[5m])) by (le, path)) > 5.0
        for: 1m
        labels:
          severity: critical
          component: api
        annotations:
          summary: "API P95 延迟超过 5 秒"
          description: "路径 {{ $labels.path }} 的 P95 延迟为 {{ $value }}秒，需要立即处理"

      # --- 并发数 ---
      - alert: HighRequestInFlight
        expr: ryframe_http_requests_in_flight > 500
        for: 2m
        labels:
          severity: warning
          component: api
        annotations:
          summary: "并发请求数超过 500"
          description: "当前并发请求数 {{ $value }}，接近处理瓶颈"

  # ============================================================
  # 2. 进程层面告警
  # ============================================================
  - name: ryframe_process_alerts
    rules:
      # --- 服务存活 ---
      - alert: ServiceDown
        expr: up{job="ryframe"} == 0
        for: 1m
        labels:
          severity: critical
          component: infra
        annotations:
          summary: "RyFrame 服务停止"
          description: "实例 {{ $labels.instance }} 已停止超过 1 分钟"

      # --- 频繁重启 ---
      - alert: ServiceRestartFrequent
        expr: changes(ryframe_process_start_time_seconds[15m]) > 0
        for: 0m
        labels:
          severity: warning
          component: infra
        annotations:
          summary: "服务频繁重启"
          description: "实例 {{ $labels.instance }} 在 15 分钟内发生了重启"

      # --- 内存高 ---
      - alert: HighMemoryUsage
        expr: ryframe_process_resident_memory_bytes / 1024 / 1024 / 1024 > 4
        for: 5m
        labels:
          severity: warning
          component: infra
        annotations:
          summary: "内存使用超过 4GB"
          description: "实例 {{ $labels.instance }} 内存使用 {{ $value }} GB"

      # --- 内存泄漏 ---
      - alert: MemoryLeak
        expr: |
          rate(ryframe_process_resident_memory_bytes[1h]) > 10485760
        for: 30m
        labels:
          severity: critical
          component: infra
        annotations:
          summary: "疑似内存泄漏"
          description: "实例 {{ $labels.instance }} 内存持续增长，1小时内增加 {{ $value | humanizeBytes }}"

      # --- CPU 高 ---
      - alert: HighCPUUsage
        expr: ryframe_process_cpu_seconds_total > 80
        for: 5m
        labels:
          severity: warning
          component: infra
        annotations:
          summary: "CPU 使用率超过 80%"
          description: "实例 {{ $labels.instance }} CPU 使用率 {{ $value }}%"

      # --- FD 过多 ---
      - alert: HighFileDescriptors
        expr: ryframe_process_open_fds > 5000
        for: 5m
        labels:
          severity: warning
          component: infra
        annotations:
          summary: "文件描述符数超过 5000"
          description: "实例 {{ $labels.instance }} 打开 {{ $value }} 个文件描述符，可能存在 FD 泄漏"

      # --- 线程数过多 ---
      - alert: HighThreadCount
        expr: ryframe_process_threads > 200
        for: 5m
        labels:
          severity: warning
          component: infra
        annotations:
          summary: "线程数超过 200"
          description: "实例 {{ $labels.instance }} 线程数 {{ $value }}，可能存在线程泄漏"

  # ============================================================
  # 3. 业务/安全层面告警
  # ============================================================
  - name: ryframe_business_alerts
    rules:
      # --- 登录失败激增 ---
      - alert: LoginSpike
        expr: rate(ryframe_http_requests_total{path=~".*auth/login",status="401"}[5m]) > 10
        for: 2m
        labels:
          severity: warning
          component: security
        annotations:
          summary: "登录失败激增"
          description: "登录失败速率 {{ $value }}/s，可能存在暴力破解攻击"

      # --- 登录成功异常 ---
      - alert: LoginAnomaly
        expr: |
          rate(ryframe_http_requests_total{path=~".*auth/login",status="200"}[5m]) > 100
        for: 2m
        labels:
          severity: warning
          component: security
        annotations:
          summary: "登录成功激增"
          description: "登录成功速率 {{ $value }}/s，可能存在自动化登录行为"

      # --- 无请求 ---
      - alert: NoRequests
        expr: rate(ryframe_http_requests_total[10m]) == 0
        for: 10m
        labels:
          severity: info
          component: api
        annotations:
          summary: "10 分钟内无任何请求"
          description: "实例 {{ $labels.instance }} 可能是闲置或故障"

  # ============================================================
  # 4. 流量/安全异常告警
  # ============================================================
  - name: ryframe_traffic_alerts
    rules:
      # --- 请求量突增（1min 速率 > 5min 均值的 3 倍）---
      - alert: TrafficSpike
        expr: |
          sum(rate(ryframe_http_requests_total[1m]))
          >
          sum(rate(ryframe_http_requests_total[5m])) * 3
        for: 2m
        labels:
          severity: warning
          component: api
        annotations:
          summary: "请求量突增"
          description: "当前 QPS {{ $value }}，超过近 5 分钟均值的 3 倍，可能是 DDoS 或流量异常"

      # --- 请求量暴跌（5min 速率不足 1h 均值的 10%）---
      - alert: TrafficDrop
        expr: |
          sum(rate(ryframe_http_requests_total[5m]))
          <
          sum(rate(ryframe_http_requests_total[1h])) * 0.1
        for: 5m
        labels:
          severity: warning
          component: api
        annotations:
          summary: "请求量暴跌"
          description: "当前 QPS 不足 1 小时均值的 10%，可能存在故障或下游中断"
