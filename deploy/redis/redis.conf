# RyFrame production persistence policy baseline.
#
# Network binding, TLS and ACL/password settings are deployment-specific and
# must be supplied by the platform. The Compose test stack overrides bind and
# protected-mode only inside its isolated CI network.

dir /data

# Refresh families, revocations, idempotency records and distributed locks are
# security state. They must survive a Redis process restart.
appendonly yes
appendfsync everysec
aof-use-rdb-preamble yes

# Security state must never be evicted to make room for cache entries.
maxmemory-policy noeviction

# Keep periodic snapshots as an additional recovery aid.
save 900 1
save 300 10
save 60 10000
