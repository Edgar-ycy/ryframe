# ============================================================
# RyFrame Helm Chart - 默认配置
# ============================================================

# 镜像配置
image:
  repository: ryframe
  tag: latest
  pullPolicy: IfNotPresent

# 副本数（如果启用 HPA 会被覆盖）
replicaCount: 2

# 部署策略
strategy:
  type: RollingUpdate
  rollingUpdate:
    maxSurge: 1
    maxUnavailable: 0

# Pod 安全上下文
podSecurityContext:
  fsGroup: 1000

# 容器安全上下文
securityContext:
  runAsUser: 1000
  runAsGroup: 1000
  runAsNonRoot: true
  readOnlyRootFilesystem: false

# ============================================================
# 应用配置
# ============================================================
app:
  host: "0.0.0.0"
  port: 3000
  env: "production"

  # 日志
  logger:
    level: "info"
    format: "json"
    output: "stdout"

  # CORS
  cors:
    allowOrigins: ["*"]
    allowMethods: ["GET", "POST", "PUT", "DELETE", "PATCH", "OPTIONS"]
    allowHeaders: ["*"]
    maxAge: 3600

  # 限流
  rateLimit:
    enabled: true
    capacity: 100
    refillPerSec: 10

  # 对象存储
  objectStorage:
    backend: "local"
    localBaseDir: "/data/uploads"
    publicBaseUrl: "/uploads"

# ============================================================
# 认证配置
# ============================================================
auth:
  jwtSecret: "CHANGE_ME_TO_A_RANDOM_64_BYTE_STRING"
  accessTokenExpire: "2h"
  refreshTokenExpire: "168h"
  maxLoginAttempts: 5
  lockoutDurationMinutes: 30
  enablePasswordComplexity: true

# ============================================================
# MySQL 配置
# ============================================================
mysql:
  # 使用 Bitnami MySQL Chart（设为 false 使用外部数据库）
  enabled: false
  # 外部数据库配置
  external:
    host: "mysql.ryframe.svc.cluster.local"
    port: 3306
    database: "ryframe"
    username: "ryframe"
    password: "CHANGE_ME"
    maxConnections: 20
    minConnections: 5
  # Bitnami MySQL 参数（enabled=true 时生效）
  auth:
    rootPassword: "CHANGE_ME"
    database: "ryframe"
    username: "ryframe"
    password: "CHANGE_ME"
  primary:
    persistence:
      size: 20Gi
    resources:
      requests:
        memory: "512Mi"
        cpu: "250m"
      limits:
        memory: "2Gi"
        cpu: "1000m"

# ============================================================
# Redis 配置
# ============================================================
redis:
  # 使用 Bitnami Redis Chart（设为 false 使用外部 Redis）
  enabled: false
  # 外部 Redis 配置
  external:
    host: "redis.ryframe.svc.cluster.local"
    port: 6379
    database: 0
    password: "CHANGE_ME"
    maxPoolSize: 10
    timeoutSecs: 3
  # Bitnami Redis 参数（enabled=true 时生效）
  auth:
    password: "CHANGE_ME"
  master:
    persistence:
      size: 5Gi
    resources:
      requests:
        memory: "128Mi"
        cpu: "100m"
      limits:
        memory: "512Mi"
        cpu: "500m"

# ============================================================
# Service 配置
# ============================================================
service:
  type: ClusterIP
  port: 3000
  targetPort: 3000
  annotations: {}

# ============================================================
# Ingress 配置
# ============================================================
ingress:
  enabled: true
  className: nginx
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "60"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "60"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
  hosts:
    - host: api.ryframe.example.com
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: ryframe-tls
      hosts:
        - api.ryframe.example.com

# ============================================================
# HPA 自动伸缩配置
# ============================================================
autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 10
  targetCPUUtilization: 70
  targetMemoryUtilization: 80
  scaleDown:
    stabilizationWindowSeconds: 300
    policies:
      - type: Percent
        value: 50
        periodSeconds: 60
  scaleUp:
    stabilizationWindowSeconds: 60
    policies:
      - type: Percent
        value: 100
        periodSeconds: 30
      - type: Pods
        value: 2
        periodSeconds: 30

# ============================================================
# 资源限制
# ============================================================
resources:
  requests:
    memory: "256Mi"
    cpu: "200m"
  limits:
    memory: "1Gi"
    cpu: "1000m"

# ============================================================
# 健康检查
# ============================================================
livenessProbe:
  httpGet:
    path: /health
    port: http
  initialDelaySeconds: 30
  periodSeconds: 15
  timeoutSeconds: 5
  failureThreshold: 3

readinessProbe:
  httpGet:
    path: /health
    port: http
  initialDelaySeconds: 10
  periodSeconds: 5
  timeoutSeconds: 3
  failureThreshold: 2

# ============================================================
# 持久化存储
# ============================================================
persistence:
  enabled: true
  uploads:
    size: 10Gi
    accessModes:
      - ReadWriteMany

# ============================================================
# 服务账户（RBAC）
# ============================================================
serviceAccount:
  create: true
  name: ""
  annotations: {}

# ============================================================
# Prometheus Metrics
# ============================================================
metrics:
  enabled: true
  port: 3000
  path: /metrics

# ============================================================
# OpenTelemetry
# ============================================================
otel:
  enabled: false
  endpoint: "http://jaeger-collector:4318/v1/traces"
  sampleRate: 1.0

# ============================================================
# 环境变量（额外覆盖）
# ============================================================
extraEnv: []
# - name: OTEL_ENABLED
#   value: "true"
# - name: OTEL_ENDPOINT
#   value: "http://tempo:4318/v1/traces"

# Pod 注解
podAnnotations:
  prometheus.io/scrape: "true"
  prometheus.io/port: "3000"
  prometheus.io/path: "/metrics"

# 节点选择
nodeSelector: {}

# 容忍
tolerations: []

# 亲和性
affinity: {}
