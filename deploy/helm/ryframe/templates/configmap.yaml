apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "ryframe.fullname" . }}-config
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "ryframe.labels" . | nindent 4 }}
data:
  app.toml: |
    [app]
    name = "ryframe"
    version = "{{ .Chart.AppVersion }}"
    host = "{{ .Values.app.host }}"
    port = {{ .Values.app.port }}

    [database]
    [[database.connections]]
    driver = "mysql"
    host = "{{ include "ryframe.mysqlHost" . }}"
    port = {{ .Values.mysql.external.port }}
    database = "{{ .Values.mysql.external.database }}"
    username = "{{ .Values.mysql.external.username }}"
    max_connections = {{ .Values.mysql.external.maxConnections }}
    min_connections = {{ .Values.mysql.external.minConnections }}
    sql_log_level = "brief"
    slow_query_threshold_ms = 200

    [auth]
    jwt_secret = "{{ .Values.auth.jwtSecret }}"
    access_token_expire = "{{ .Values.auth.accessTokenExpire }}"
    refresh_token_expire = "{{ .Values.auth.refreshTokenExpire }}"
    max_login_attempts = {{ .Values.auth.maxLoginAttempts }}
    lockout_duration_minutes = {{ .Values.auth.lockoutDurationMinutes }}
    enable_password_complexity = {{ .Values.auth.enablePasswordComplexity }}

    [redis]
    host = "{{ include "ryframe.redisHost" . }}"
    port = {{ .Values.redis.external.port }}
    database = {{ .Values.redis.external.database }}
    max_pool_size = {{ .Values.redis.external.maxPoolSize }}
    timeout_secs = {{ .Values.redis.external.timeoutSecs }}

    [logger]
    level = "{{ .Values.app.logger.level }}"
    format = "{{ .Values.app.logger.format }}"
    output = "{{ .Values.app.logger.output }}"

    [cors]
    allow_origins = [{{ range $i, $v := .Values.app.cors.allowOrigins }}{{ if $i }}, {{ end }}"{{ $v }}"{{ end }}]
    allow_methods = [{{ range $i, $v := .Values.app.cors.allowMethods }}{{ if $i }}, {{ end }}"{{ $v }}"{{ end }}]
    allow_headers = [{{ range $i, $v := .Values.app.cors.allowHeaders }}{{ if $i }}, {{ end }}"{{ $v }}"{{ end }}]
    max_age = {{ .Values.app.cors.maxAge }}

    [rate_limit]
    enabled = {{ .Values.app.rateLimit.enabled }}
    capacity = {{ .Values.app.rateLimit.capacity }}
    refill_per_sec = {{ .Values.app.rateLimit.refillPerSec }}

    [object_storage]
    backend = "{{ .Values.app.objectStorage.backend }}"
    local_base_dir = "{{ .Values.app.objectStorage.localBaseDir }}"
    public_base_url = "{{ .Values.app.objectStorage.publicBaseUrl }}"
