apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "ryframe.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "ryframe.labels" . | nindent 4 }}
    app: {{ include "ryframe.name" . }}
spec:
  replicas: {{ .Values.replicaCount }}
  strategy:
    type: {{ .Values.strategy.type }}
    {{- if eq .Values.strategy.type "RollingUpdate" }}
    rollingUpdate:
      maxSurge: {{ .Values.strategy.rollingUpdate.maxSurge }}
      maxUnavailable: {{ .Values.strategy.rollingUpdate.maxUnavailable }}
    {{- end }}
  selector:
    matchLabels:
      {{- include "ryframe.selectorLabels" . | nindent 6 }}
      app: {{ include "ryframe.name" . }}
  template:
    metadata:
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
        checksum/secret: {{ include (print $.Template.BasePath "/secret.yaml") . | sha256sum }}
        {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      labels:
        {{- include "ryframe.selectorLabels" . | nindent 8 }}
        app: {{ include "ryframe.name" . }}
    spec:
      {{- if .Values.serviceAccount.create }}
      serviceAccountName: {{ include "ryframe.serviceAccountName" . }}
      {{- end }}
      {{- with .Values.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      initContainers:
        - name: wait-for-db
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until nc -z {{ include "ryframe.mysqlHost" . }} {{ .Values.mysql.external.port }}; do
                echo "等待 MySQL..."
                sleep 2
              done
              echo "MySQL 就绪"
      containers:
        - name: {{ .Chart.Name }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          {{- with .Values.securityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          env:
            # 数据库密码
            - name: RYFRAME_DATABASE__CONNECTIONS__PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "ryframe.fullname" . }}-secret
                  key: db-password
            # JWT 密钥
            - name: RYFRAME_AUTH__JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ include "ryframe.fullname" . }}-secret
                  key: jwt-secret
            # Redis 密码
            - name: RYFRAME_REDIS__PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "ryframe.fullname" . }}-secret
                  key: redis-password
            # 运行环境
            - name: RYFRAME_APP__ENV
              value: {{ .Values.app.env | quote }}
            - name: RUST_LOG
              value: "{{ .Values.app.logger.level }},ryframe=debug"
            # OpenTelemetry
            {{- if .Values.otel.enabled }}
            - name: OTEL_ENABLED
              value: "true"
            - name: OTEL_ENDPOINT
              valueFrom:
                secretKeyRef:
                  name: {{ include "ryframe.fullname" . }}-secret
                  key: otel-endpoint
            - name: OTEL_SERVICE_NAME
              value: {{ include "ryframe.fullname" . | quote }}
            - name: OTEL_SAMPLE_RATE
              value: {{ .Values.otel.sampleRate | quote }}
            {{- end }}
            {{- with .Values.extraEnv }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          ports:
            - name: http
              containerPort: {{ .Values.app.port }}
              protocol: TCP
          volumeMounts:
            - name: config
              mountPath: /app/config
            {{- if .Values.persistence.enabled }}
            - name: uploads
              mountPath: {{ .Values.app.objectStorage.localBaseDir }}
            {{- end }}
          {{- with .Values.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.livenessProbe }}
          livenessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.readinessProbe }}
          readinessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
      volumes:
        - name: config
          configMap:
            name: {{ include "ryframe.fullname" . }}-config
        {{- if .Values.persistence.enabled }}
        - name: uploads
          persistentVolumeClaim:
            claimName: {{ include "ryframe.fullname" . }}-uploads
        {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
