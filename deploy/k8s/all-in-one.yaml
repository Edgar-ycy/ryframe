# RyFrame Kubernetes 部署清单
#
# 部署顺序：
# 1. 基础：namespace → configmap → secret
# 2. 数据库：mysql-deployment → mysql-service
# 3. 缓存：redis-deployment → redis-service
# 4. 应用：ryframe-deployment → ryframe-service → hpa → ingress

# ==================== Namespace ====================
apiVersion: v1
kind: Namespace
metadata:
  name: ryframe
---
# ==================== ConfigMap（非敏感配置） ====================
apiVersion: v1
kind: ConfigMap
metadata:
  name: ryframe-config
  namespace: ryframe
data:
  app.toml: |
    [app]
    name = "ryframe"
    version = "0.1.0"
    host = "0.0.0.0"
    port = 3000

    [database]
    [[database.connections]]
    driver = "mysql"
    host = "mysql.ryframe.svc.cluster.local"
    port = 3306
    database = "ryframe"
    username = "ryframe"
    max_connections = 20
    min_connections = 5

    [auth]
    # JWT 密钥从 Secret 注入环境变量覆盖
    jwt_secret = "PLACEHOLDER"
    access_token_expire = "2h"
    refresh_token_expire = "168h"
    max_login_attempts = 5
    lockout_duration_minutes = 30
    enable_password_complexity = true

    [redis]
    host = "redis.ryframe.svc.cluster.local"
    port = 6379
    database = 0
    max_pool_size = 10
    timeout_secs = 3

    [logger]
    level = "info"
    format = "json"
    output = "stdout"

    [cors]
    allow_origins = ["*"]
    allow_methods = ["GET", "POST", "PUT", "DELETE", "PATCH", "OPTIONS"]
    allow_headers = ["*"]
    max_age = 3600

    [rate_limit]
    enabled = true
    capacity = 100
    refill_per_sec = 10

    [object_storage]
    backend = "local"
    local_base_dir = "/data/uploads"
    public_base_url = "/uploads"
---
# ==================== Secret（敏感信息） ====================
apiVersion: v1
kind: Secret
metadata:
  name: ryframe-secrets
  namespace: ryframe
type: Opaque
stringData:
  # 生产环境请使用 SealedSecret 或外部密钥管理
  jwt-secret: "CHANGE_ME_TO_A_RANDOM_64_BYTE_STRING"
  db-password: "CHANGE_ME"
  redis-password: "CHANGE_ME"
---
# ==================== MySQL Deployment + Service ====================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mysql
  namespace: ryframe
  labels:
    app: mysql
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mysql
  template:
    metadata:
      labels:
        app: mysql
    spec:
      containers:
        - name: mysql
          image: mysql:8.0
          env:
            - name: MYSQL_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: ryframe-secrets
                  key: db-password
            - name: MYSQL_DATABASE
              value: ryframe
            - name: MYSQL_USER
              value: ryframe
            - name: MYSQL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: ryframe-secrets
                  key: db-password
          ports:
            - containerPort: 3306
              name: mysql
          volumeMounts:
            - name: mysql-data
              mountPath: /var/lib/mysql
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "2Gi"
              cpu: "1000m"
          livenessProbe:
            tcpSocket:
              port: 3306
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            exec:
              command:
                - mysqladmin
                - ping
                - -h
                - localhost
            initialDelaySeconds: 10
            periodSeconds: 5
      volumes:
        - name: mysql-data
          persistentVolumeClaim:
            claimName: mysql-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: mysql
  namespace: ryframe
  labels:
    app: mysql
spec:
  selector:
    app: mysql
  ports:
    - port: 3306
      targetPort: 3306
      name: mysql
  type: ClusterIP
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: mysql-pvc
  namespace: ryframe
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 20Gi
---
# ==================== Redis Deployment + Service ====================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  namespace: ryframe
  labels:
    app: redis
spec:
  replicas: 1
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis
    spec:
      containers:
        - name: redis
          image: redis:7-alpine
          command:
            - redis-server
            - --appendonly
            - "yes"
            - --requirepass
            - "$(REDIS_PASSWORD)"
          env:
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: ryframe-secrets
                  key: redis-password
          ports:
            - containerPort: 6379
              name: redis
          volumeMounts:
            - name: redis-data
              mountPath: /data
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            tcpSocket:
              port: 6379
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            exec:
              command:
                - redis-cli
                - ping
            initialDelaySeconds: 5
            periodSeconds: 5
      volumes:
        - name: redis-data
          persistentVolumeClaim:
            claimName: redis-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: redis
  namespace: ryframe
  labels:
    app: redis
spec:
  selector:
    app: redis
  ports:
    - port: 6379
      targetPort: 6379
      name: redis
  type: ClusterIP
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: redis-pvc
  namespace: ryframe
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
---
# ==================== RyFrame Application ====================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ryframe
  namespace: ryframe
  labels:
    app: ryframe
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: ryframe
  template:
    metadata:
      labels:
        app: ryframe
    spec:
      initContainers:
        - name: wait-for-db
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until nc -z mysql.ryframe.svc.cluster.local 3306; do
                echo "等待 MySQL..."
                sleep 2
              done
              echo "MySQL 就绪"
      containers:
        - name: ryframe
          image: ryframe:latest
          imagePullPolicy: IfNotPresent
          env:
            # 数据库密码
            - name: RYFRAME_DATABASE__CONNECTIONS__PASSWORD
              valueFrom:
                secretKeyRef:
                  name: ryframe-secrets
                  key: db-password
            # JWT 密钥
            - name: RYFRAME_AUTH__JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: ryframe-secrets
                  key: jwt-secret
            # Redis 密码
            - name: RYFRAME_REDIS__PASSWORD
              valueFrom:
                secretKeyRef:
                  name: ryframe-secrets
                  key: redis-password
            # 运行环境
            - name: RYFRAME_APP__ENV
              value: "production"
            - name: RUST_LOG
              value: "info,ryframe=debug"
          ports:
            - containerPort: 3000
              name: http
              protocol: TCP
          volumeMounts:
            - name: config
              mountPath: /app/config
            - name: uploads
              mountPath: /data/uploads
          resources:
            requests:
              memory: "256Mi"
              cpu: "200m"
            limits:
              memory: "1Gi"
              cpu: "1000m"
          livenessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 2
      volumes:
        - name: config
          configMap:
            name: ryframe-config
        - name: uploads
          persistentVolumeClaim:
            claimName: uploads-pvc
---
# ==================== Service ====================
apiVersion: v1
kind: Service
metadata:
  name: ryframe
  namespace: ryframe
  labels:
    app: ryframe
spec:
  selector:
    app: ryframe
  ports:
    - port: 3000
      targetPort: 3000
      name: http
      protocol: TCP
  type: ClusterIP
---
# ==================== HPA 自动伸缩 ====================
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: ryframe-hpa
  namespace: ryframe
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: ryframe
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Percent
          value: 50
          periodSeconds: 60
    scaleUp:
      stabilizationWindowSeconds: 60
      policies:
        - type: Percent
          value: 100
          periodSeconds: 30
        - type: Pods
          value: 2
          periodSeconds: 30
      selectPolicy: Max
---
# ==================== Ingress ====================
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ryframe-ingress
  namespace: ryframe
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "60"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "60"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - api.ryframe.example.com
      secretName: ryframe-tls
  rules:
    - host: api.ryframe.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: ryframe
                port:
                  number: 3000
---
# ==================== Uploads PVC ====================
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: uploads-pvc
  namespace: ryframe
spec:
  accessModes:
    - ReadWriteMany
  resources:
    requests:
      storage: 10Gi
