# ============================================================
# RyFrame AlertManager 告警规则
#
# Prometheus 数据源：http://<prometheus>:9090
# Metrics 端点：http://<ryframe>:8080/api/v1/monitor/metrics
# Metrics 前缀：ryframe_
#
# 告警分类：
#   - HTTP 服务可用性（错误率、延迟、并发）
#   - 进程健康（CPU、内存、FD、线程）
#   - 安全告警（4xx 比例异常）
#   - 流量异常（请求量突变）
# ============================================================

groups:
  # ============================================================
  # 1. HTTP 服务可用性告警
  # ============================================================
  - name: ryframe_http_alerts
    rules:
      # -----------------------------------------------
      # 服务宕机
      # -----------------------------------------------
      - alert: RyFrameDown
        expr: up{job="ryframe"} == 0
        for: 1m
        labels:
          severity: critical
          team: backend
        annotations:
          summary: "RyFrame 服务宕机（实例 {{ $labels.instance }}）"
          description: "RyFrame 实例 {{ $labels.instance }} 已超过 1 分钟无法被 Prometheus 抓取。请立即检查服务状态。"
          runbook: "1. 检查服务进程是否存活（systemctl status ryframe）\n2. 查看应用日志（journalctl -u ryframe -n 100）\n3. 检查数据库/Redis 连通性"

      # -----------------------------------------------
      # HTTP 5xx 错误率高
      # -----------------------------------------------
      - alert: RyFrameHigh5xxRate
        expr: |
          (
            sum(rate(ryframe_http_requests_total{status=~"5.."}[5m])) by (instance)
            /
            sum(rate(ryframe_http_requests_total[5m])) by (instance)
          ) > 0.05
        for: 5m
        labels:
          severity: critical
          team: backend
        annotations:
          summary: "RyFrame 5xx 错误率超过 5%（实例 {{ $labels.instance }}）"
          description: "实例 {{ $labels.instance }} 的 5xx 错误率为 {{ $value | humanizePercentage }}，持续 5 分钟。\n当前 5xx 速率：{{ with query \"sum(rate(ryframe_http_requests_total{status=~\\\"5..\\\"}[5m]))\" }}{{ . | first | value | humanize }}/s{{ end }}"
          runbook: "1. 查看应用错误日志\n2. 检查数据库连接池是否耗尽\n3. 检查 Redis 是否可用"

      # -----------------------------------------------
      # HTTP 4xx 错误率高（可能安全攻击）
      # -----------------------------------------------
      - alert: RyFrameHigh4xxRate
        expr: |
          (
            sum(rate(ryframe_http_requests_total{status=~"4.."}[5m])) by (instance)
            /
            sum(rate(ryframe_http_requests_total[5m])) by (instance)
          ) > 0.30
        for: 10m
        labels:
          severity: warning
          team: backend
        annotations:
          summary: "RyFrame 4xx 错误率超过 30%（实例 {{ $labels.instance }}）"
          description: "实例 {{ $labels.instance }} 的 4xx 错误率为 {{ $value | humanizePercentage }}，持续 10 分钟。\n可能是暴力破解、凭证过期或爬虫攻击。"
          runbook: "1. 检查 Nginx access log 中的 4xx 请求来源 IP\n2. 确认是否有大批量凭证过期\n3. 检查限流策略是否生效"

      # -----------------------------------------------
      # 登录失败激增（暴力破解检测）
      # -----------------------------------------------
      - alert: RyFrameLoginSpike
        expr: |
          sum(rate(ryframe_http_requests_total{path="/api/v1/auth/login",status="401"}[5m])) > 10
        for: 5m
        labels:
          severity: warning
          team: security
        annotations:
          summary: "RyFrame 登录失败速率异常（{{ $value }}/s）"
          description: "登录接口 401 响应超过 10 req/s，持续 5 分钟。可能存在暴力破解攻击。"
          runbook: "1. 检查登录日志（sys_login_info 表）\n2. 确认攻击来源 IP\n3. 调整登录限流策略（rate_limit.api_limits 中 POST /api/v1/auth/login）"

      # -----------------------------------------------
      # P99 延迟过高
      # -----------------------------------------------
      - alert: RyFrameHighLatency
        expr: |
          histogram_quantile(0.99,
            sum(rate(ryframe_http_request_duration_seconds_bucket[5m])) by (le, instance)
          ) > 2
        for: 10m
        labels:
          severity: warning
          team: backend
        annotations:
          summary: "RyFrame P99 延迟超过 2s（实例 {{ $labels.instance }}）"
          description: "实例 {{ $labels.instance }} 的 P99 响应延迟为 {{ $value }}s，持续 10 分钟。"
          runbook: "1. 检查慢查询日志（slow_query_threshold_ms）\n2. 检查数据库连接池使用率\n3. 查看 CPU/内存使用情况"

  # ============================================================
  # 2. 进程健康告警
  # ============================================================
  - name: ryframe_process_alerts
    rules:
      # -----------------------------------------------
      # 内存使用过高
      # -----------------------------------------------
      - alert: RyFrameHighMemory
        expr: ryframe_process_resident_memory_bytes > 2 * 1024 * 1024 * 1024
        for: 5m
        labels:
          severity: warning
          team: backend
        annotations:
          summary: "RyFrame 内存使用超过 2GB（实例 {{ $labels.instance }}）"
          description: "实例 {{ $labels.instance }} 的常驻内存为 {{ $value | humanize }}B，持续 5 分钟。可能发生内存泄漏。"
          runbook: "1. 检查是否有大量缓存未过期\n2. 检查是否有未关闭的数据库连接\n3. 使用 heaptrack 进行内存分析"

      # -----------------------------------------------
      # 文件描述符使用过高
      # -----------------------------------------------
      - alert: RyFrameHighFileDescriptors
        expr: ryframe_process_open_fds > 5000
        for: 5m
        labels:
          severity: warning
          team: backend
        annotations:
          summary: "RyFrame 打开文件描述符数超过 5000（实例 {{ $labels.instance }}）"
          description: "实例 {{ $labels.instance }} 的打开 FD 数为 {{ $value }}，持续 5 分钟。可能存在连接泄漏。"
          runbook: "1. 检查数据库连接池配置\n2. 检查是否有未释放的 HTTP 连接\n3. 调整系统 ulimit -n"

      # -----------------------------------------------
      # 线程数异常增长
      # -----------------------------------------------
      - alert: RyFrameHighThreads
        expr: ryframe_process_threads > 200
        for: 10m
        labels:
          severity: warning
          team: backend
        annotations:
          summary: "RyFrame 线程数超过 200（实例 {{ $labels.instance }}）"
          description: "实例 {{ $labels.instance }} 的线程数为 {{ $value }}，持续 10 分钟。"

      # -----------------------------------------------
      # 服务意外重启
      # -----------------------------------------------
      - alert: RyFrameRestarted
        expr: |
          changes(ryframe_process_start_time_seconds[10m]) > 0
        for: 0m
        labels:
          severity: info
          team: backend
        annotations:
          summary: "RyFrame 服务在最近 10 分钟内重启（实例 {{ $labels.instance }}）"
          description: "实例 {{ $labels.instance }} 的启动时间戳发生变化，服务可能已重启。"

  # ============================================================
  # 3. 流量异常告警
  # ============================================================
  - name: ryframe_traffic_alerts
    rules:
      # -----------------------------------------------
      # 请求量骤降（可能服务异常）
      # -----------------------------------------------
      - alert: RyFrameTrafficDrop
        expr: |
          sum(rate(ryframe_http_requests_total[5m])) < 1
        for: 10m
        labels:
          severity: warning
          team: backend
        annotations:
          summary: "RyFrame 请求量骤降（{{ $value }}/s）"
          description: "近 5 分钟请求速率低于 1 req/s，持续 10 分钟。服务可能不可达或上游链路故障。"
          runbook: "1. 检查 Nginx 是否正常\n2. 检查 DNS 解析\n3. 检查网络连通性"

      # -----------------------------------------------
      # 请求量激增（可能 DDoS 或业务高峰）
      # -----------------------------------------------
      - alert: RyFrameTrafficSpike
        expr: |
          sum(rate(ryframe_http_requests_total[5m])) > 500
        for: 5m
        labels:
          severity: warning
          team: backend
        annotations:
          summary: "RyFrame 请求量激增（{{ $value }}/s）"
          description: "近 5 分钟请求速率超过 500 req/s，持续 5 分钟。可能是 DDoS 攻击或业务高峰。"
          runbook: "1. 检查 Nginx access log 中的高频 IP\n2. 确认是否为正常业务高峰\n3. 必要时调整限流参数"

      # -----------------------------------------------
      # 并发请求数过高
      # -----------------------------------------------
      - alert: RyFrameHighConcurrency
        expr: ryframe_http_requests_in_flight > 100
        for: 5m
        labels:
          severity: warning
          team: backend
        annotations:
          summary: "RyFrame 并发请求数超过 100（实例 {{ $labels.instance }}）"
          description: "实例 {{ $labels.instance }} 当前并发请求数为 {{ $value }}，持续 5 分钟。可能请求堆积。"
          runbook: "1. 检查是否有慢请求阻塞\n2. 检查数据库连接池是否耗尽\n3. 考虑扩容实例"
